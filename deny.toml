# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
# Wired into CI via .github/workflows/ci.yml (audit job).

[graph]
all-features = false

[advisories]
yanked = "warn"
ignore = [
    # glib <0.20 unsoundness in VariantStrIter. Transitive via
    # dioxus-desktop -> wry/tao/gtk 0.18; cannot upgrade without a
    # major dioxus-desktop bump. Not reachable from our code paths.
    "RUSTSEC-2024-0429",
    # The following are all "unmaintained" informational advisories
    # for crates pulled in transitively through dioxus-desktop's
    # gtk-rs 0.18 / wry / tao / webkit2gtk stack. Not vulnerabilities;
    # cannot be removed without a major dioxus-desktop upgrade.
    "RUSTSEC-2024-0320",
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2025-0141",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

# novel-core / novel-shared are pulled directly from
# github.com/taidge/novel which currently ships without a LICENSE
# file. Treat them as MIT to unblock CI; the upstream repo should
# add explicit license metadata.
[[licenses.clarify]]
name = "novel-core"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "novel-shared"
expression = "MIT"
license-files = []

[bans]
multiple-versions = "allow"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
