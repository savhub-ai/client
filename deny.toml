# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
# Wired into CI via .github/workflows/ci.yml (audit job).

[graph]
all-features = false

[advisories]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "allow"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
