name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          rustflags: ""

      - name: Build workspace
        run: cargo build --workspace --release --locked

      - name: Package artifacts
        shell: pwsh
        run: |
          $dist = Join-Path $pwd "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $arch = switch ("${{ runner.arch }}") {
            "X64" { "x64" }
            "ARM64" { "arm64" }
            default { "${{ runner.arch }}".ToLowerInvariant() }
          }
          $platform = switch ("${{ runner.os }}") {
            "Linux" { "linux-$arch" }
            "Windows" { "windows-$arch" }
            "macOS" { "macos-$arch" }
            default { throw "unsupported runner OS: ${{ runner.os }}" }
          }
          $archiveExt = if ("${{ runner.os }}" -eq "Windows") { ".zip" } else { ".tar.gz" }
          $binaryExt = if ("${{ runner.os }}" -eq "Windows") { ".exe" } else { "" }

          # Package CLI + Desktop together
          $pkgName = "savhub-$platform"
          $staging = Join-Path $dist $pkgName
          New-Item -ItemType Directory -Force -Path $staging | Out-Null

          Copy-Item (Join-Path $pwd "target/release/savhub$binaryExt") (Join-Path $staging "savhub$binaryExt")
          Copy-Item (Join-Path $pwd "target/release/savhub-desktop$binaryExt") (Join-Path $staging "savhub-desktop$binaryExt")

          $archive = Join-Path $dist "$pkgName$archiveExt"
          if ("${{ runner.os }}" -eq "Windows") {
            Compress-Archive -Path "$staging/*" -DestinationPath $archive -Force
          } else {
            tar -C $dist -czf $archive $pkgName
          }

          Remove-Item $staging -Recurse -Force

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-assets-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  msi:
    name: Build Windows MSI Installer
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download Windows build artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-assets-windows-latest
          path: dist

      - name: Install WiX Toolset
        run: dotnet tool install -g wix

      - name: Extract binaries
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter "savhub-windows-*.zip" | Select-Object -First 1
          $tmpDir = Join-Path $pwd "msi-tmp"
          Expand-Archive -Path $zip.FullName -DestinationPath $tmpDir -Force
          # Flatten into msi-staging so WiX can find the files directly
          $msiDir = Join-Path $pwd "msi-staging"
          New-Item -ItemType Directory -Force -Path $msiDir | Out-Null
          Get-ChildItem -Path $tmpDir -Recurse -Filter "*.exe" | Copy-Item -Destination $msiDir -Force
          Remove-Item $tmpDir -Recurse -Force

      - name: Create WiX source
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          # Ensure version is valid for MSI (X.Y.Z, no prerelease)
          if ($version -match "^(\d+\.\d+\.\d+)") {
            $msiVersion = $Matches[1]
          } else {
            $msiVersion = "0.1.0"
          }

          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package
              Name="Savhub"
              Manufacturer="Savhub AI"
              Version="$msiVersion"
              UpgradeCode="A1B2C3D4-E5F6-7890-ABCD-EF1234567890">

              <MajorUpgrade
                DowngradeErrorMessage="A newer version of Savhub is already installed." />

              <StandardDirectory Id="LocalAppDataFolder">
                <Directory Id="SAVHUBDIR" Name="savhub">
                  <Directory Id="INSTALLDIR" Name="bin">
                    <Component Id="SavhubCLI" Guid="*">
                      <File Source="msi-staging\savhub.exe" />
                      <Environment
                        Id="PATH"
                        Name="PATH"
                        Value="[INSTALLDIR]"
                        Permanent="no"
                        Part="last"
                        Action="set"
                        System="no" />
                    </Component>
                    <Component Id="SavhubDesktop" Guid="*">
                      <File Source="msi-staging\savhub-desktop.exe" />
                    </Component>
                  </Directory>
                </Directory>
              </StandardDirectory>

              <Feature Id="MainFeature" Title="Savhub" Level="1">
                <ComponentRef Id="SavhubCLI" />
                <ComponentRef Id="SavhubDesktop" />
              </Feature>
            </Package>
          </Wix>
          "@

          Set-Content -Path "savhub.wxs" -Value $wxs -Encoding UTF8

      - name: Build MSI
        shell: pwsh
        run: |
          wix build savhub.wxs -o dist/savhub-windows-x64.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-assets-msi
          path: dist/*.msi
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, msi]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: dist

      - name: Copy install scripts
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/install.ps1 dist/install.ps1

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Install

            **Linux / macOS** (one-liner):
            ```sh
            curl -fsSL https://raw.githubusercontent.com/savhub-ai/client/main/scripts/install.sh | bash
            ```

            **Windows** (PowerShell):
            ```powershell
            irm https://raw.githubusercontent.com/savhub-ai/client/main/scripts/install.ps1 | iex
            ```

            **Windows MSI** (GUI installer with PATH setup):
            Download `savhub-windows-x64.msi` below and run it.
