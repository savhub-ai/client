name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          rustflags: ""

      - name: Build workspace
        run: cargo build --workspace --release --locked

      - name: Package artifacts
        shell: pwsh
        run: |
          $dist = Join-Path $pwd "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $arch = switch ("${{ runner.arch }}") {
            "X64" { "x64" }
            "ARM64" { "arm64" }
            default { "${{ runner.arch }}".ToLowerInvariant() }
          }
          $platform = switch ("${{ runner.os }}") {
            "Linux" { "linux-$arch" }
            "Windows" { "windows-$arch" }
            "macOS" { "macos-$arch" }
            default { throw "unsupported runner OS: ${{ runner.os }}" }
          }
          $archiveExt = if ("${{ runner.os }}" -eq "Windows") { ".zip" } else { ".tar.gz" }
          $binaryExt = if ("${{ runner.os }}" -eq "Windows") { ".exe" } else { "" }

          $packages = @(
            @{ Binary = "savhub$binaryExt"; Name = "savhub-cli-$platform" },
            @{ Binary = "savhub-desktop$binaryExt"; Name = "savhub-desktop-$platform" }
          )

          foreach ($package in $packages) {
            $staging = Join-Path $dist $package.Name
            New-Item -ItemType Directory -Force -Path $staging | Out-Null

            $binarySource = Join-Path $pwd "target/release/$($package.Binary)"
            Copy-Item $binarySource (Join-Path $staging $package.Binary)

            $archive = Join-Path $dist "$($package.Name)$archiveExt"
            if ("${{ runner.os }}" -eq "Windows") {
              Compress-Archive -Path "$staging/*" -DestinationPath $archive -Force
            } else {
              tar -C $dist -czf $archive $package.Name
            }

            Remove-Item $staging -Recurse -Force
          }

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  deb:
    name: Build Linux .deb Package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-ubuntu-latest
          path: dist

      - name: Build .deb package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARCH="amd64"

          PKG_ROOT="deb-staging"
          mkdir -p "${PKG_ROOT}/DEBIAN"
          mkdir -p "${PKG_ROOT}/usr/local/bin"

          # Extract CLI binary
          tar -xzf dist/savhub-cli-linux-x64.tar.gz -C /tmp
          cp /tmp/savhub-cli-linux-x64/savhub "${PKG_ROOT}/usr/local/bin/savhub"
          chmod 755 "${PKG_ROOT}/usr/local/bin/savhub"

          # Create control file
          cat > "${PKG_ROOT}/DEBIAN/control" <<CTRL
          Package: savhub
          Version: ${VERSION}
          Section: devel
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: Savhub AI <support@savhub.ai>
          Description: Savhub CLI - AI skills package manager
           Search, install, and manage AI agent skills from the
           Savhub registry. Works with Claude Code, Codex, and more.
          CTRL
          # Remove leading spaces from heredoc (control file is whitespace-sensitive)
          sed -i 's/^          //' "${PKG_ROOT}/DEBIAN/control"

          dpkg-deb --build "${PKG_ROOT}" "dist/savhub-cli-linux-x64.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-deb
          path: dist/*.deb
          if-no-files-found: error

  pkg:
    name: Build macOS .pkg Installer
    runs-on: macos-latest
    needs: build
    steps:
      - name: Download macOS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-macos-latest
          path: dist

      - name: Build .pkg installer
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          PKG_ROOT="pkg-staging"
          INSTALL_DEST="${PKG_ROOT}/usr/local/bin"
          mkdir -p "${INSTALL_DEST}"

          # Extract CLI binary
          tar -xzf dist/savhub-cli-macos-x64.tar.gz -C /tmp
          cp /tmp/savhub-cli-macos-x64/savhub "${INSTALL_DEST}/savhub"
          chmod 755 "${INSTALL_DEST}/savhub"

          # Build .pkg using pkgbuild (built into macOS)
          pkgbuild \
            --root "${PKG_ROOT}" \
            --identifier ai.savhub.cli \
            --version "${VERSION}" \
            --install-location / \
            "dist/savhub-cli-macos-x64.pkg"

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-pkg
          path: dist/*.pkg
          if-no-files-found: error

  msi:
    name: Build Windows MSI Installer
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-windows-latest
          path: dist

      - name: Install WiX Toolset
        run: dotnet tool install -g wix

      - name: Extract CLI binary
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter "savhub-cli-windows-*.zip" | Select-Object -First 1
          $extractDir = Join-Path $pwd "msi-staging"
          Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force

      - name: Create WiX source
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          # Ensure version is valid for MSI (X.Y.Z, no prerelease)
          if ($version -match "^(\d+\.\d+\.\d+)") {
            $msiVersion = $Matches[1]
          } else {
            $msiVersion = "0.1.0"
          }

          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package
              Name="Savhub CLI"
              Manufacturer="Savhub AI"
              Version="$msiVersion"
              UpgradeCode="A1B2C3D4-E5F6-7890-ABCD-EF1234567890">

              <MajorUpgrade
                DowngradeErrorMessage="A newer version of Savhub CLI is already installed." />

              <StandardDirectory Id="LocalAppDataFolder">
                <Directory Id="SAVHUBDIR" Name="savhub">
                  <Directory Id="INSTALLDIR" Name="bin">
                    <Component Id="SavhubCLI" Guid="*">
                      <File Source="msi-staging\savhub.exe" />
                      <Environment
                        Id="PATH"
                        Name="PATH"
                        Value="[INSTALLDIR]"
                        Permanent="no"
                        Part="last"
                        Action="set"
                        System="no" />
                    </Component>
                  </Directory>
                </Directory>
              </StandardDirectory>

              <Feature Id="MainFeature" Title="Savhub CLI" Level="1">
                <ComponentRef Id="SavhubCLI" />
              </Feature>
            </Package>
          </Wix>
          "@

          Set-Content -Path "savhub.wxs" -Value $wxs -Encoding UTF8

      - name: Build MSI
        shell: pwsh
        run: |
          wix build savhub.wxs -o dist/savhub-cli-windows-x64.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-msi
          path: dist/*.msi
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, deb, pkg, msi]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: dist

      - name: Copy install scripts
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/install.ps1 dist/install.ps1

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Install

            **Linux / macOS** (one-liner):
            ```sh
            curl -fsSL https://raw.githubusercontent.com/savhub-ai/client/main/scripts/install.sh | bash
            ```

            **Windows** (PowerShell):
            ```powershell
            irm https://raw.githubusercontent.com/savhub-ai/client/main/scripts/install.ps1 | iex
            ```

            **Windows MSI** (GUI installer with PATH setup):
            Download `savhub-cli-windows-x64.msi` below and run it.
