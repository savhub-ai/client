name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  fmt:
    name: Cargo Fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt
          rustflags: ""

      - name: Check formatting
        run: cargo fmt --all --check

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typos
        uses: crate-ci/typos@v1

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts

  check-server:
    name: Check Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake g++ make perl

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          cache: true
          rustflags: ""

      - name: Cargo check (server + frontend + shared)
        run: cargo check -p server -p savhub-frontend -p savhub-shared --all-targets --locked

  check-client:
    name: Check Client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake g++ make perl \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libxdo-dev libayatana-appindicator3-dev librsvg2-dev lld

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          cache: true
          rustflags: ""

      - name: Cargo check (client crates)
        run: cargo check -p savhub -p savhub-desktop -p savhub-local -p savhub-shared --all-targets --locked

  test:
    name: Cargo Test
    runs-on: ubuntu-latest
    needs: [check-server, check-client]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake g++ make perl \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libxdo-dev libayatana-appindicator3-dev librsvg2-dev lld

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          cache: true
          rustflags: ""

      - name: Cargo test
        run: cargo test --workspace --locked

  audit:
    name: Cargo Audit & Deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          cache: true
          rustflags: ""

      - name: Run cargo-audit (advisory DB)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cargo-deny (licenses, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
